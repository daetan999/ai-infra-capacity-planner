<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title>Capacity planning control plane</title>
  <desc>An industrial drafting board connects a fictional inference demand profile to indicative capacity, cost, constraint, and evidence ranges.</desc>
  <defs>
    <pattern id="draft-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#353127" stroke-width="1"/>
    </pattern>
    <style>
      .display { font-family: "Barlow Semi Condensed", "Arial Narrow", sans-serif; font-weight: 600; }
      .mono { font-family: "Azeret Mono", "Courier New", monospace; }
      .label { fill: #b8ae99; font-size: 11px; letter-spacing: 1.6px; }
      .body { fill: #f3eedf; font-size: 14px; }
      .line { stroke: #514a3c; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#171714"/>
  <rect x="28" y="28" width="1144" height="564" fill="url(#draft-grid)" stroke="#776b55"/>
  <rect x="28" y="28" width="1144" height="58" fill="#1d1c18" stroke="#514a3c"/>
  <path d="M54 57h18l8-14 10 28 10-14h24" fill="none" stroke="#ef6b3b" stroke-width="4"/>
  <text x="145" y="64" class="mono label">CAPACITY PLANNER / INDICATIVE MODEL</text>
  <circle cx="1118" cy="57" r="5" fill="#ef6b3b"/>
  <text x="1134" y="62" class="mono label">LIVE</text>

  <rect x="62" y="120" width="330" height="430" fill="#22211c" stroke="#776b55"/>
  <text x="86" y="151" class="mono label">01 · DEMAND PROFILE</text>
  <text x="86" y="187" class="display" fill="#f3eedf" font-size="27">Realtime assistant</text>
  <rect x="86" y="215" width="282" height="58" fill="#191814" stroke="#514a3c"/>
  <text x="102" y="238" class="mono label">WORKLOAD MODE</text>
  <text x="102" y="260" class="mono" fill="#ef6b3b" font-size="14">LLM INFERENCE</text>
  <rect x="86" y="289" width="133" height="74" fill="#2b2922" stroke="#514a3c"/>
  <rect x="235" y="289" width="133" height="74" fill="#2b2922" stroke="#514a3c"/>
  <text x="102" y="314" class="mono label">PEAK RPS</text>
  <text x="102" y="345" class="mono" fill="#f3eedf" font-size="22">46.2</text>
  <text x="251" y="314" class="mono label">CONTEXT</text>
  <text x="251" y="345" class="mono" fill="#f3eedf" font-size="22">8K</text>
  <rect x="86" y="379" width="282" height="74" fill="#191814" stroke="#514a3c"/>
  <text x="102" y="404" class="mono label">TARGET UTILIZATION</text>
  <line x1="102" y1="430" x2="348" y2="430" stroke="#776b55" stroke-width="8"/>
  <line x1="102" y1="430" x2="255" y2="430" stroke="#ef6b3b" stroke-width="8"/>
  <circle cx="255" cy="430" r="7" fill="#ef6b3b"/>
  <rect x="86" y="476" width="282" height="50" fill="#ef6b3b"/>
  <text x="128" y="507" class="display" fill="#21130e" font-size="16">CALCULATE ENVELOPE →</text>

  <path d="M392 334h62" fill="none" stroke="#d9a441" stroke-width="2" stroke-dasharray="6 7"/>
  <circle cx="423" cy="334" r="7" fill="#d9a441"/>

  <rect x="454" y="120" width="684" height="430" fill="#22211c" stroke="#776b55"/>
  <text x="478" y="151" class="mono label">02 · CAPACITY ENVELOPE</text>
  <rect x="478" y="176" width="202" height="112" fill="#191814" stroke="#514a3c"/>
  <rect x="694" y="176" width="202" height="112" fill="#191814" stroke="#514a3c"/>
  <rect x="910" y="176" width="204" height="112" fill="#191814" stroke="#514a3c"/>
  <text x="496" y="202" class="mono label">ACCELERATORS</text>
  <text x="496" y="249" class="mono" fill="#ef6b3b" font-size="36">7–8</text>
  <text x="496" y="272" class="mono label">ILLUSTRATIVE PROFILE</text>
  <text x="712" y="202" class="mono label">MONTHLY RANGE</text>
  <text x="712" y="246" class="mono" fill="#ef6b3b" font-size="27">$19–40K</text>
  <text x="712" y="272" class="mono label">COMPUTE PLANNING BAND</text>
  <text x="928" y="202" class="mono label">CONFIDENCE</text>
  <text x="928" y="244" class="mono" fill="#d9a441" font-size="27">HIGH</text>
  <line x1="928" y1="266" x2="1088" y2="266" stroke="#776b55" stroke-width="8"/>
  <line x1="928" y1="266" x2="1060" y2="266" stroke="#d9a441" stroke-width="8"/>

  <rect x="478" y="304" width="636" height="106" fill="#2b2922" stroke="#514a3c"/>
  <text x="496" y="331" class="mono label">THROUGHPUT BRIDGE</text>
  <line x1="496" y1="365" x2="1088" y2="365" stroke="#776b55" stroke-width="12"/>
  <line x1="496" y1="365" x2="866" y2="365" stroke="#d9a441" stroke-width="12"/>
  <line x1="496" y1="365" x2="750" y2="365" stroke="#ef6b3b" stroke-width="12"/>
  <line x1="750" y1="348" x2="750" y2="382" stroke="#f3eedf" stroke-width="2"/>
  <text x="496" y="394" class="mono label">THEORETICAL</text>
  <text x="712" y="394" class="mono label">DERATED</text>
  <text x="905" y="394" class="mono label">62% UTILIZED</text>

  <rect x="478" y="426" width="306" height="98" fill="#191814" stroke="#514a3c"/>
  <rect x="798" y="426" width="316" height="98" fill="#191814" stroke="#514a3c"/>
  <text x="496" y="453" class="mono label">PRIMARY CONSTRAINT</text>
  <text x="496" y="488" class="display" fill="#f3eedf" font-size="19">Network movement</text>
  <text x="816" y="453" class="mono label">NEXT EVIDENCE</text>
  <text x="816" y="488" class="display" fill="#f3eedf" font-size="19">Peak-load replay</text>
</svg>
