<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title>Capacity planning control plane</title>
  <desc>A dark technical workspace connects workload demand to infrastructure, commercial ranges, and an evidence plan.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#090b0d"/><stop offset="1" stop-color="#14191d"/></linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#d5ff52"/><stop offset="1" stop-color="#5be7d3"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#242a31" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
